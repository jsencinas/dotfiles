[blur-my-shell]
settings-version=2

[blur-my-shell/appfolder]
brightness=0.59999999999999998
sigma=30

[blur-my-shell/dash-to-dock]
blur=true
brightness=0.59999999999999998
sigma=30
static-blur=true
style-dash-to-dock=0

[blur-my-shell/panel]
brightness=0.59999999999999998
sigma=30

[blur-my-shell/window-list]
brightness=0.59999999999999998
sigma=30

[clipboard-indicator]
clear-on-boot=true
disable-down-arrow=true
display-mode=0
notify-on-copy=false
paste-on-select=true
toggle-menu=['<Super>v']

[dash-to-dock]
background-opacity=0.80000000000000004
dash-max-icon-size=48
dock-fixed=false
dock-position='BOTTOM'
height-fraction=0.90000000000000002
intellihide=true
intellihide-mode='MAXIMIZED_WINDOWS'
preferred-monitor=-2
preferred-monitor-by-connector='eDP-1'
require-pressure-to-show=true
show-dock-urgent-notify=false

[top-bar-organizer]
center-box-order=['dateMenu']
left-box-order=['activities']
right-box-order=['screenRecording', 'clipboardIndicator', 'screenSharing', 'dwellClick', 'a11y', 'keyboard', 'quickSettings']
